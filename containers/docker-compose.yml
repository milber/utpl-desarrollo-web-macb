version: '3.8'

services:
  web:
    image: php:8.3-apache
    container_name: web_php_arm
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
    # Esta es la instrucción para instalar al arrancar
    command: >
      sh -c "docker-php-ext-install mysqli &&
             docker-php-ext-enable mysqli &&
             apache2-foreground"
    restart: always

